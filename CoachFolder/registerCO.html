<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sana Website Register</title>
    <link rel="stylesheet" href="registerCO.css">
    <link rel="icon" href="/img/Favicon.png" type="image/svg+xml">
</head>

<body>
    <div class="container">
        <div class="content-box">
            <div class="content">

                <h2>Register Sana Coach Account</h2>

                <form id="registerForm">

                    <div class="input-box">
                        <label for="inputFName">Enter First Name</label>
                        <input type="text" placeholder="First Name" id="inputFName" name="firstName" required>
                    </div>

                    <div class="input-box">
                        <label for="inputLName">Enter Last Name</label>
                        <input type="text" placeholder="Last Name" id="inputLName" name="lastName" required>
                    </div>

                    <div class="input-box">
                        <label for="inputEmail">Enter Email</label>
                        <input type="email" placeholder="Email" id="inputEmail" name="email" required>
                    </div>

                    <div class="input-box">
                        <label for="inputPass">Enter Password</label>
                        <div class="password-wrapper">
                            <input type="password" placeholder="Password" id="inputPass" name="password" required>
                            <img src="/src/assets/eye.svg" class="eye-icon" data-target="inputPass">
                        </div>
                    </div>

                    <div class="input-box">
                        <label for="confPass">Confirm Password</label>
                        <div class="password-wrapper">
                            <input type="password" placeholder="Confirm Password" id="confPass" name="confPassword"
                                required>
                            <img src="/src/assets/eye.svg" class="eye-icon" data-target="confPass">
                        </div>
                    </div>

                    <div class="input-box">
                        <input type="submit" value="Submit">
                    </div>

                    <div class="login">
                        <label>Already have an Account?</label>
                        <a href="../Login/login.html" class="login-link">Sign In</a>
                    </div>

                </form>

            </div>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", () => {

            const icons = document.querySelectorAll(".eye-icon");

            icons.forEach(icon => {

                icon.addEventListener("click", () => {

                    const input = document.getElementById(icon.dataset.target);

                    input.type = input.type === "password" ? "text" : "password";

                });

            });

        });

        document.getElementById("registerForm").addEventListener("submit", async function (e) {

            e.preventDefault();

            const password = document.getElementById("password").value;
            const confirm = document.getElementById("confPassword").value;

            if (password !== confirm) {

                alert("Passwords do not match");
                return;

            }

            const data = {

                firstName: document.getElementById("firstName").value,
                lastName: document.getElementById("lastName").value,
                username: document.getElementById("username").value,
                email: document.getElementById("email").value,
                password: password,

            };

            try {

                const res = await fetch("http://127.0.0.1:8000/auth/register", {

                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify(data)

                });

                const result = await res.json();

                if (!res.ok) {

                    throw new Error(result.detail);

                }

                localStorage.setItem("access_token", result.access_token);

                alert("Account created!");

                window.location.href = "../coachHomepage/index.html";

            } catch (err) {
                alert(err.message || "Unknown error");
            }
        });

    </script>
</body>

</html>
