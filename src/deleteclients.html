        <div class="clients-buttons">

  </div>

  <script>
    let removeMode = false;

    function handleRemoveClients() {
      const checkboxes = document.querySelectorAll(".select-box");
      const checkedClients = document.querySelectorAll(".client-check:checked");
      const removeBtn = document.querySelector(".remove-btn");

      if (!removeMode) {
        removeMode = true;
        checkboxes.forEach(box => box.classList.remove("hidden"));
        removeBtn.textContent = "Confirm Remove";
        return;
      }

      checkedClients.forEach(check => {
        check.closest(".client-card").remove();
      });

      const remainingCheckboxes = document.querySelectorAll(".select-box");
      const remainingChecks = document.querySelectorAll(".client-check");

      remainingCheckboxes.forEach(box => box.classList.add("hidden"));
      remainingChecks.forEach(check => check.checked = false);

      removeMode = false;
      removeBtn.textContent = "Remove Clients";
    }
  </script>
