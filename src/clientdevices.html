<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Profile</title>
<link rel="stylesheet" href="./clientdevices.css">
</head>

<body>

<div class="layout">

<aside class="sidebar">

<div class="brand"><img src="../img/Logo.png" alt="Sana Logo" class="logo"></div>

<nav class="nav">
        <ul>
          <li><a href="clienthomepage.html"> <span class="nav-icon"></span> <span>Home</span></a></li> 
          <li><a href="sana.html"> <span class="nav-icon"></span><span>Sana</span></a></li>
          <li><a href="analytics.html"> <span class="nav-icon"></span><span>Analytics</span></a></li>
          <li><a class="active" href="coachpage.html"> <span class="nav-icon">◫</span><span>Coach</span></a></li>
          <li><a href="clientprofile.html"> <span class="nav-icon"></span><span>Settings</span></a></li>
        </ul>
      </nav>

<div class="sidebar-bottom">
<a href="#">Help</a>
<a href="#">Logout</a>
</div>

</aside>

<main class="content">

<header class="topbar">
<h2>Profile</h2>
</header>

<section class="profile-page">


<div id="profileSection">

<div class="profile-avatar">

<div class="avatar-circle">
<div class="avatar-head"></div>
<div class="avatar-body"></div>
</div>

<div class="profile-name">
F**** N***
</div>

</div>

<div class="profile-fields">

<div class="pfield">
<label>Email</label>
<div class="pfield-box">
example@mail.com
</div>
</div>

<div class="pfield">
<label>Phone Number</label>
<div class="pfield-box">
+44 1234 567890
</div>
</div>

<div class="pfield">
<label>Date Of Birth</label>
<div class="pfield-box">
01/10/2004
</div>
</div>

</div>

<div class="profile-buttons">

<button
class="pbtn pbtn-devices"
id="viewDevicesBtn"
type="button"
>
View Devices
</button>

<button
class="pbtn pbtn-logout"
type="button"
>
Log Out
</button>

</div>

</div>


<div class="devices-section hidden" id="devicesSection">

<div class="devices-header">

<h3>My Devices</h3>

<button
class="back-btn"
id="backBtn"
type="button"
>
← Back to Profile
</button>

</div>

<div class="device-form">

<input
type="text"
id="deviceName"
placeholder="Device name (Example: iPhone 15)"
>

<input
type="text"
id="deviceType"
placeholder="Device type (Example: Mobile)"
>

<button
class="add-device-btn"
id="addDeviceBtn"
type="button"
>
Add Device
</button>

</div>

<div
class="devices-list"
id="devicesList"
></div>

</div>

</section>

</main>
</div>


<script>

const profileSection = document.getElementById("profileSection");
const devicesSection = document.getElementById("devicesSection");

const viewDevicesBtn = document.getElementById("viewDevicesBtn");
const backBtn = document.getElementById("backBtn");


const deviceNameInput = document.getElementById("deviceName");
const deviceTypeInput = document.getElementById("deviceType");

const addDeviceBtn = document.getElementById("addDeviceBtn");
const devicesList = document.getElementById("devicesList");

let devices = [
{ id:1, name:"iPhone 14", type:"Mobile" },
{ id:2, name:"MacBook Pro", type:"Laptop" }
];

viewDevicesBtn.addEventListener("click", () => {

profileSection.style.display = "none";
devicesSection.classList.remove("hidden");

renderDevices();

});

backBtn.addEventListener("click", () => {

devicesSection.classList.add("hidden");
profileSection.style.display = "block";

});

addDeviceBtn.addEventListener("click", () => {

const name = deviceNameInput.value.trim();
const type = deviceTypeInput.value.trim();

if(!name || !type){

alert("Please enter device name and type");
return;

}

devices.push({
id:Date.now(),
name,
type
});

deviceNameInput.value="";
deviceTypeInput.value="";

renderDevices();

});


function renderDevices(){

devicesList.innerHTML="";

if(devices.length === 0){

devicesList.innerHTML="<p>No devices added.</p>";
return;

}

devices.forEach(device => {

const card = document.createElement("div");

card.className="device-card";

card.innerHTML = `

<div class="device-info">

<strong>${device.name}</strong>
<br>
<span>${device.type}</span>

</div>

<button
class="remove-device-btn"
data-id="${device.id}"
>
Remove
</button>

`;

devicesList.appendChild(card);

});

document.querySelectorAll(".remove-device-btn")
.forEach(btn => {

btn.addEventListener("click", () => {

const id = Number(btn.dataset.id);

devices = devices.filter(d => d.id !== id);

renderDevices();

});

});

}

</script>

</body>
</html>
