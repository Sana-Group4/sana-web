<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sana Forgot Password</title>
    <link rel="stylesheet" href="forPass.css">
    <link rel="icon" href="/img/Favicon.png" type="image/svg+xml">
</head>

<body>
    <div class="container">
        <div class="content-box">
            <div class="content">
                <h2>Requesting New Password</h2>

                <form id="emailForm">

                    <div class="input-box">
                        <label for="email">Enter Your Email</label>
                        <input type="email" id="email" placeholder="Email" required>
                    </div>

                    <div class="input-box">
                        <input type="submit" value="Verify Email">
                    </div>
                </form>


                <form id="authCodeForm" style="display: none;">
                    <div class="input-box">
                        <label for="code">Enter the Code sent to the Email</label>
                        <input type="code" id="code" placeholder="Code" required>
                    </div>

                    <div class="input-box">
                        <input type="submit" value="Verify Email">
                    </div>
                </form>


                <form id="passwordForm" style="display: none;">

                    <div class="input-box password-box">
                        <label for="inputPass">Enter New Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="inputPass" placeholder="password" required>
                            <img src="/src/assets/eye.svg" class="eye-icon" data-target="inputPass">
                        </div>
                    </div>

                    <div class="input-box password-box">
                        <label for="confPass">Confirm Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="confPass" placeholder="password" required>
                            <img src="/src/assets/eye.svg" class="eye-icon" data-target="confPass">
                        </div>
                    </div>

                    <div class="input-box">
                        <input type="submit" value="Update Password">
                    </div>

                </form>

            </div>
        </div>
    </div>
    <script src="./forPass.js"></script>

</body>

</html>
